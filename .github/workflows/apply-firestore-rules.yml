name: Apply Firestore Rules Repair

on:
  push:
    paths:
      - 'scripts/apply-firestore-appeal-rules.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Restore and surgically update rules
        run: python scripts/apply-firestore-appeal-rules.py
      - name: Commit repaired rules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add firestore.rules
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Restore full Firestore rules and add deactivation appeals surgically"
          git push
