name: Build Canela Portal for GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Repair generated listener syntax
        run: node scripts/fix-generated-syntax.mjs

      - name: Build compiled site into docs
        run: npx vite build

      - name: Add GitHub Pages marker
        run: touch docs/.nojekyll

      - name: Commit compiled site to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f docs
          if git diff --cached --quiet; then
            echo "Compiled site is already current."
          else
            git commit -m "deploy: update compiled GitHub Pages site [skip ci]"
            git push origin main
          fi